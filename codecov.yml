coverage:
  precision: 2
  round: down
  range: "50...100"
  status:
    project:
      default:
        target: 50%
        threshold: 0%
      backend:
        target: 50%
        threshold: 0%
        flags:
          - backend
      frontend:
        target: 50%
        threshold: 0%
        flags:
          - frontend
    patch:
      default:
        target: 50%
        threshold: 0%

flags:
  backend:
    paths:
      - core/
  frontend:
    paths:
      - client/src/
