name: Deploy to Railway

on:
  push:
    branches: [main]

env:
  RAILWAY_CLI_VERSION: 4.58.0

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: |
          npm install -g @railway/cli@${RAILWAY_CLI_VERSION}
          railway --version
      - name: Deploy
        run: |
          for attempt in 1 2 3; do
            echo "Railway deploy attempt ${attempt}/3 for backend"
            if railway up --service backend --environment production --ci; then
              exit 0
            fi

            if [ "${attempt}" = "3" ]; then
              exit 1
            fi

            sleep $((attempt * 20))
          done
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-celery:
    name: Deploy Celery Worker
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: |
          npm install -g @railway/cli@${RAILWAY_CLI_VERSION}
          railway --version
      - name: Deploy
        run: |
          for attempt in 1 2 3; do
            echo "Railway deploy attempt ${attempt}/3 for celery-worker"
            if railway up --service celery-worker --environment production --ci; then
              exit 0
            fi

            if [ "${attempt}" = "3" ]; then
              exit 1
            fi

            sleep $((attempt * 20))
          done
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-celery
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: |
          npm install -g @railway/cli@${RAILWAY_CLI_VERSION}
          railway --version
      - name: Deploy
        run: |
          for attempt in 1 2 3; do
            echo "Railway deploy attempt ${attempt}/3 for frontend"
            if railway up --service frontend --environment production --ci; then
              exit 0
            fi

            if [ "${attempt}" = "3" ]; then
              exit 1
            fi

            sleep $((attempt * 20))
          done
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
