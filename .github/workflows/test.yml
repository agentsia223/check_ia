name: Tests

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

jobs:
    backend-tests:
        name: Backend Tests
        runs-on: ubuntu-latest
        permissions:
            contents: read
        env:
            DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
            DB_HOST: localhost
            SUPABASE_URL: https://test.supabase.co
            SUPABASE_ANON_KEY: test-anon-key
            SUPABASE_DB_PASSWORD: test-password
            DJANGO_SETTINGS_MODULE: config.settings_test
            OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
                  cache: "pip"
            - name: Install dependencies
              run: |
                  pip install -r requirements.txt
                  pip install pytest pytest-django pytest-cov
            - name: Run tests
              run: pytest --cov=core --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=80 -v
            - name: Upload backend coverage to Codecov
              uses: codecov/codecov-action@v5
              with:
                  files: ./coverage.xml
                  flags: backend
                  name: backend
                  fail_ci_if_error: true
                  token: ${{ secrets.CODECOV_TOKEN }}

    frontend-tests:
        name: Frontend Tests
        runs-on: ubuntu-latest
        permissions:
            contents: read
        defaults:
            run:
                working-directory: client
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "18"
                  cache: "npm"
                  cache-dependency-path: client/package-lock.json
            - name: Install dependencies
              run: npm ci
            - name: Run tests
              run: npm test -- --watchAll=false --coverage --coverageReporters=text --coverageReporters=lcov
            - name: Upload frontend coverage to Codecov
              uses: codecov/codecov-action@v5
              with:
                  files: ./client/coverage/lcov.info
                  flags: frontend
                  name: frontend
                  fail_ci_if_error: true
                  token: ${{ secrets.CODECOV_TOKEN }}
